<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}⚽ WC 2026 Predictor{% endblock %}</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/@picocss/pico@2/css/pico.min.css"
  />
  <style>
    :root {
      --brand: #1a6e3c;
      --brand-light: #e8f5ee;
    }

    body { background: #f4f8f6; }

    nav.top-nav {
      background: var(--brand);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    nav.top-nav .brand {
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
      text-decoration: none;
      margin-right: auto;
    }
    nav.top-nav a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.15s;
    }
    nav.top-nav a:hover { color: #fff; }
    nav.top-nav form { margin: 0; }
    nav.top-nav button.logout-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.5);
      color: rgba(255,255,255,0.85);
      padding: 0.3rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.15s, color 0.15s;
    }
    nav.top-nav button.logout-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    main.container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }

    .flash {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }
    .flash.success { background: #d4edda; color: #155724; }
    .flash.error   { background: #f8d7da; color: #721c24; }
    .flash.info    { background: #d1ecf1; color: #0c5460; }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .badge {
      display: inline-block;
      padding: 0.2em 0.55em;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .badge-scheduled  { background: #cfe2ff; color: #084298; }
    .badge-in-play    { background: #fff3cd; color: #856404; }
    .badge-finished   { background: #d1e7dd; color: #0a3622; }
    .badge-postponed  { background: #e2e3e5; color: #41464b; }

    .points-chip {
      display: inline-block;
      padding: 0.15em 0.6em;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
    }
    .points-chip.earned { background: #d1e7dd; color: #0a3622; }
    .points-chip.zero   { background: #f8d7da; color: #842029; }
    .points-chip.pending { background: #e2e3e5; color: #41464b; }

    /* Prediction radio row */
    .pred-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 0.6rem;
    }
    .pred-label {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.35rem 0.75rem;
      border: 2px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: border-color 0.15s, background 0.15s;
      background: #fff;
    }
    .pred-label input[type=radio] { display: none; }
    .pred-label:has(input:checked),
    .pred-label.selected {
      border-color: var(--brand);
      background: var(--brand-light);
      font-weight: 600;
    }
    .pred-label.locked {
      cursor: default;
      opacity: 0.75;
    }

    /* Leaderboard */
    table.leaderboard { width: 100%; border-collapse: collapse; }
    table.leaderboard th, table.leaderboard td {
      padding: 0.6rem 0.8rem;
      text-align: left;
    }
    table.leaderboard thead tr { background: var(--brand); color: #fff; }
    table.leaderboard tbody tr:nth-child(even) { background: #f4f8f6; }
    table.leaderboard tbody tr:first-child td { font-weight: 700; }

    .rank-medal { font-size: 1.2rem; }
  </style>
</head>
<body>

{% if user %}
<nav class="top-nav">
  <a class="brand" href="/dashboard">⚽ WC 2026 Predictor</a>
  <a href="/dashboard">🏠 Dashboard</a>
  <a href="/leaderboard">🏆 Leaderboard</a>
  {% if user.is_admin %}
  <a href="/admin">🛠 Admin</a>
  {% endif %}
  <a href="/player/{{ user.user_id }}" title="My profile">
    <img src="/avatar/{{ user.user_id }}" alt=""
         style="width:28px; height:28px; border-radius:50%; object-fit:cover; border:1px solid rgba(255,255,255,0.5); display:block;"
         onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'⚽',style:'font-size:1.2rem'}))" />
  </a>
  <form method="post" action="/logout">
    <button class="logout-btn" type="submit">Logout ({{ user.sub }})</button>
  </form>
</nav>
{% endif %}

<main class="container">
  {% block content %}{% endblock %}
</main>

</body>
</html>
