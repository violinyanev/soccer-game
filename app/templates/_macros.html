{# Reusable participant avatar. Falls back to a ⚽ disc when no photo is set. #}
{% macro avatar(user_id, filename, username, size=28) %}
  {%- if filename -%}
    <img src="/avatar/{{ user_id }}" alt="{{ username }}" title="{{ username }}"
         style="width:{{ size }}px; height:{{ size }}px; border-radius:50%; object-fit:cover; vertical-align:middle;" />
  {%- else -%}
    <span title="{{ username }}"
          style="display:inline-flex; align-items:center; justify-content:center;
                 width:{{ size }}px; height:{{ size }}px; border-radius:50%;
                 background:var(--brand-light); font-size:{{ (size * 0.55) | int }}px; vertical-align:middle;">⚽</span>
  {%- endif -%}
{% endmacro %}
