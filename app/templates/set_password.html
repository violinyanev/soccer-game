<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>⚽ WC 2026 Predictor — Set Password</title>
  <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@2/css/pico.min.css" />
  <style>
    body {
      background: linear-gradient(135deg, #1a6e3c 0%, #0d3d22 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
    .card h1 { text-align: center; font-size: 1.5rem; margin-bottom: 0.25rem; }
    .card .subtitle { text-align: center; color: #555; font-size: 0.92rem; margin-bottom: 1.5rem; }
    .error-msg {
      background: #f8d7da;
      color: #721c24;
      padding: 0.6rem 0.9rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    label { font-weight: 600; font-size: 0.9rem; }
    button[type=submit] {
      width: 100%;
      background: #1a6e3c;
      border-color: #1a6e3c;
      margin-top: 0.5rem;
    }
    button[type=submit]:hover { background: #145730; }
    .back-link { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
    .back-link a { color: #1a6e3c; }
  </style>
</head>
<body>
  <div class="card">
    <h1>👋 Welcome, {{ username }}!</h1>
    <p class="subtitle">First time here — please set your password to get started.</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" action="/set-password">
      <input type="hidden" name="username" value="{{ username }}" />

      <label for="password">Choose a password</label>
      <input
        id="password"
        type="password"
        name="password"
        placeholder="At least 6 characters"
        required
        minlength="6"
        autocomplete="new-password"
      />

      <label for="confirm_password" style="margin-top:0.75rem;">Confirm password</label>
      <input
        id="confirm_password"
        type="password"
        name="confirm_password"
        placeholder="Repeat your password"
        required
        autocomplete="new-password"
      />

      <button type="submit">Set password &amp; enter →</button>
    </form>

    <div class="back-link"><a href="/login">← Back to login</a></div>
  </div>
</body>
</html>
