<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>⚽ WC 2026 Predictor — Login</title>
  <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@2/css/pico.min.css" />
  <style>
    body {
      background: linear-gradient(135deg, #1a6e3c 0%, #0d3d22 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 14px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
    .login-card h1 {
      text-align: center;
      font-size: 1.6rem;
      margin-bottom: 0.25rem;
    }
    .login-card .subtitle {
      text-align: center;
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 1.75rem;
    }
    .error-msg {
      background: #f8d7da;
      color: #721c24;
      padding: 0.6rem 0.9rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    label { font-weight: 600; font-size: 0.9rem; }
    select, input[type=password] { margin-top: 0.25rem; }
    button[type=submit] {
      width: 100%;
      background: #1a6e3c;
      border-color: #1a6e3c;
      margin-top: 0.5rem;
    }
    button[type=submit]:hover { background: #145730; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>⚽ WC 2026</h1>
    <p class="subtitle">Family Prediction Game</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <label for="username">Who are you?</label>
      <select id="username" name="username" required>
        <option value="" disabled selected>— choose your name —</option>
        {% for u in users %}
        <option value="{{ u }}">{{ u }}</option>
        {% endfor %}
      </select>

      <label for="password" style="margin-top:1rem;">Password</label>
      <input
        id="password"
        type="password"
        name="password"
        placeholder="Enter your password"
        autocomplete="current-password"
      />
      <small style="color:#666;">First time? Leave blank — you'll set your password next.</small>

      <button type="submit">Sign in →</button>
    </form>
  </div>
</body>
</html>
